name: Build and push Windows MLIR image to GHCR

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      target:
        description: 'Docker build target: dev or runtime'
        required: false
        default: 'dev'
      tag:
        description: 'Image tag to push (defaults to SHA or latest on main)'
        required: false

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push
    runs-on: windows-2022
    env:
      REGISTRY: ghcr.io
      IMAGE_REPO: ${{ github.repository_owner }}/vs-mlir-windows

    steps:
      - name: Checkout (with shallow submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1
          set-safe-directory: true
          # Shallow submodules (fetch-depth: 1) speeds up large submodule checkouts
          # submodules-depth: 1
          

      - name: Prepare target
        run: |
          $target = '${{ github.event.inputs.target }}'
          if ([string]::IsNullOrEmpty($target)) { $target = 'dev' }
          "TARGET=$target" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/vs-mlir-windows
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
          flavor: |
            latest=auto
            

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Ensure Docker is in Windows containers mode
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $cli = 'C:\Program Files\Docker\Docker\DockerCli.exe'
          if (Test-Path $cli) {
            Write-Host "Switching Docker daemon to Windows containers..."
            & $cli -SwitchDaemon windows
            Start-Sleep -Seconds 10
          } else {
            Write-Host "DockerCli.exe not found; runner may already be in Windows containers mode or unsupported. Continuing."
          }
          docker info

  # Clean up Docker data to avoid hcsshim ImportLayer errors
      - name: Docker system prune (cleanup)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          docker system prune -af

    # https://github.com/moby/buildkit/issues/6009
    #   - name: Set up Docker Buildx
    #     uses: docker/setup-buildx-action@v4

    #   - name: Build and push
    #     uses: docker/build-push-action@v7
    #     with:
    #       context: .
    #       file: Dockerfile
    #       push: true
    #       tags: ${{ steps.meta.outputs.tags }}
    #       labels: ${{ steps.meta.outputs.labels }}
    #     #   target: ${{ env.TARGET }}
    #     #   platforms: windows/amd64

      - name: Build image (Windows native, disable BuildKit, retry)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          DOCKER_BUILDKIT: '0'
          COMPOSE_DOCKER_CLI_BUILD: '0'
        run: |
          $tags = '${{ steps.meta.outputs.tags }}'
          if (-not $tags) { Write-Error 'No tags from metadata-action'; exit 1 }
          $tagList = ($tags -split '[,\r\n\s]+' ) | ForEach-Object { $_.Trim() } | Where-Object { $_ -ne '' }
          $tagArgs = $tagList | ForEach-Object { "-t `"$_`"" }
          $attempt=0
          while ($attempt -lt 3) {
            try {
              $attempt++
              Write-Host "Build attempt $attempt"
              iex "docker build $($tagArgs -join ' ') -f Dockerfile ."
              break
            } catch {
              Write-Host "Build failed on attempt ${attempt}: $($_)"
              if ($attempt -ge 3) { throw "Build failed after 3 attempts" }
              Start-Sleep -Seconds (10 * $attempt)
              Write-Host "Retrying..."
            }
          }
      # - name: Build image (Windows native with cache)
      #   if: runner.os == 'Windows'
      #   shell: pwsh
      #   run: |
      #     $tags = '${{ steps.meta.outputs.tags }}'
      #     if (-not $tags) { Write-Error 'No tags from metadata-action'; exit 1 }
      #     # Split tags on commas, newlines or whitespace (handles CRLF and newline-separated lists)
      #     $tagList = ($tags -split '[,\r\n\s]+' ) | ForEach-Object { $_.Trim() } | Where-Object { $_ -ne '' }
      #     Write-Host "Tags: $($tagList -join ',')"

      #     # Use the first tag as the cache source
      #     $cacheFrom = $tagList[0]
      #     $tagArgs = $tagList | ForEach-Object { "-t `"$_`"" }
      #     $buildCmd = "docker build $($tagArgs -join ' ') -f Dockerfile ."
      #     Write-Host "Running: $buildCmd"
      #     iex $buildCmd

      - name: Push image (Windows native)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tags = '${{ steps.meta.outputs.tags }}'
          if (-not $tags) { Write-Error 'No tags from metadata-action'; exit 1 }
          $tagList = ($tags -split '[,\r\n\s]+' ) | ForEach-Object { $_.Trim() } | Where-Object { $_ -ne '' }
          foreach ($t in $tagList) {
            Write-Host "Pushing $t"
            docker push $t
          }