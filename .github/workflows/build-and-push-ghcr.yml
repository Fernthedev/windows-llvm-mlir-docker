name: Build and push Windows MLIR image to GHCR

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      target:
        description: 'Docker build target: dev or runtime'
        required: false
        default: 'dev'
      tag:
        description: 'Image tag to push (defaults to SHA or latest on main)'
        required: false

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push
    runs-on: windows-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_REPO: ${{ github.repository_owner }}/vs-mlir-windows

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Prepare target
        run: |
          $target = '${{ github.event.inputs.target }}'
          if ([string]::IsNullOrEmpty($target)) { $target = 'dev' }
          "TARGET=$target" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/vs-mlir-windows
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
          flavor: |
            latest=auto
            

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
    # https://github.com/moby/buildkit/issues/6009
    #   - name: Set up Docker Buildx
    #     uses: docker/setup-buildx-action@v4

    #   - name: Build and push
    #     uses: docker/build-push-action@v7
    #     with:
    #       context: .
    #       file: Dockerfile
    #       push: true
    #       tags: ${{ steps.meta.outputs.tags }}
    #       labels: ${{ steps.meta.outputs.labels }}
    #     #   target: ${{ env.TARGET }}
    #     #   platforms: windows/amd64


      - name: Build and push (Windows native with cache)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tags = '${{ steps.meta.outputs.tags }}'
          if (-not $tags) { Write-Error 'No tags from metadata-action'; exit 1 }
          # Split tags on commas, newlines or whitespace (handles CRLF and newline-separated lists)
          $tagList = ($tags -split '[,\r\n\s]+' ) | ForEach-Object { $_.Trim() } | Where-Object { $_ -ne '' }
          Write-Host "Tags: $($tagList -join ',')"

          # Use the first tag as the cache source
          $cacheFrom = $tagList[0]
          $tagArgs = $tagList | ForEach-Object { "-t `"$_`"" }
          $buildCmd = "docker build $($tagArgs -join ' ') --build-arg BUILDKIT_INLINE_CACHE=1 --cache-from=$cacheFrom -f Dockerfile ."
          Write-Host "Running: $buildCmd"
          iex $buildCmd

          foreach ($t in $tagList) {
            Write-Host "Pushing $t"
            docker push $t
          }